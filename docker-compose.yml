services:
  postgres:
    image: postgres:16-alpine
    container_name: rewards-audit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rewards_audit
      POSTGRES_PASSWORD: rewards_audit_password
      POSTGRES_DB: rewards_audit
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rewards_audit -d rewards_audit"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
